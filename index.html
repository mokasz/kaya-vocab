<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaya's Vocab - NEW TREASURE Stage 1</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --primary: #6C63FF; --primary-light: #EEF0FF;
      --success: #22C55E; --warning: #F59E0B; --danger: #EF4444;
      --bg: #F0F2FF; --card-bg: #FFFFFF;
      --text: #1E1B4B; --text-sub: #6B7280; --border: #E5E7EB;
      --radius: 20px; --flip-speed: 0.55s;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

    /* ===== Header ===== */
    header { background:var(--primary); color:white; padding:14px 20px; display:flex; align-items:center; justify-content:space-between; }
    header h1 { font-size:1.1rem; font-weight:700; }
    header .sub { font-size:0.75rem; opacity:0.8; }
    .streak { background:rgba(255,255,255,0.2); padding:5px 12px; border-radius:20px; font-size:0.82rem; font-weight:600; }

    /* ===== Progress ===== */
    .prog-wrap { background:white; padding:10px 20px; border-bottom:1px solid var(--border); }
    .prog-row { display:flex; justify-content:space-between; font-size:0.78rem; color:var(--text-sub); margin-bottom:5px; }
    .prog-bar { height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
    .prog-fill { height:100%; background:linear-gradient(90deg,var(--primary),#A855F7); border-radius:3px; transition:width 0.4s; }

    /* ===== Tabs ===== */
    .tabs { display:flex; background:white; border-bottom:2px solid var(--border); }
    .tab { flex:1; padding:11px 0; border:none; background:none; font-size:0.85rem; font-weight:600; color:var(--text-sub); cursor:pointer; border-bottom:3px solid transparent; margin-bottom:-2px; transition:all 0.2s; }
    .tab.on { color:var(--primary); border-bottom-color:var(--primary); }

    main { padding:20px 16px; max-width:600px; margin:0 auto; }
    .view { display:none; } .view.on { display:block; }

    /* ===== Card counter ===== */
    .ctr { text-align:center; font-size:0.82rem; color:var(--text-sub); margin-bottom:14px; }

    /* ===== 3D Card ===== */
    .scene { perspective:1000px; margin-bottom:20px; }
    .card3d {
      position:relative; width:100%; min-height:320px;
      transform-style:preserve-3d; transition:transform var(--flip-speed) ease;
    }
    .card3d.flipped { transform:rotateY(180deg); }

    .face {
      position:absolute; width:100%; min-height:320px;
      backface-visibility:hidden; -webkit-backface-visibility:hidden;
      background:var(--card-bg); border-radius:var(--radius);
      box-shadow:0 6px 28px rgba(108,99,255,0.13);
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; padding:28px 24px; gap:16px;
      border:2px solid var(--border);
    }
    .face.back { transform:rotateY(180deg); }
    .face.back.correct { border-color:var(--success); }
    .face.back.wrong   { border-color:var(--danger); }

    /* Front face */
    .theme-badge { font-size:0.72rem; color:var(--primary); background:var(--primary-light); padding:3px 10px; border-radius:10px; font-weight:700; }
    .card-illust { width:130px; height:130px; object-fit:contain; border-radius:14px; background:#F8F9FF; padding:6px; }
    .sent-display { font-size:1.05rem; line-height:1.9; text-align:center; color:var(--text); width:100%; }
    .blank { display:inline-block; min-width:80px; border-bottom:3px solid var(--primary); margin:0 4px; vertical-align:bottom; }

    .input-row { display:flex; gap:8px; width:100%; }
    .answer-input {
      flex:1; padding:12px 16px; border:2px solid var(--border);
      border-radius:12px; font-size:1rem; color:var(--text);
      outline:none; transition:border-color 0.2s;
      text-align:center; letter-spacing:1px;
    }
    .answer-input:focus { border-color:var(--primary); }
    .check-btn {
      padding:12px 20px; background:var(--primary); color:white;
      border:none; border-radius:12px; font-size:0.9rem; font-weight:700;
      cursor:pointer; transition:background 0.2s; white-space:nowrap;
    }
    .check-btn:hover { background:#5A52E0; }

    .hint-row { display:flex; gap:8px; justify-content:center; }
    .hint-btn { background:none; border:1px solid var(--border); color:var(--text-sub); font-size:0.8rem; cursor:pointer; padding:5px 12px; border-radius:20px; transition:all 0.2s; }
    .hint-btn:hover:not(:disabled) { background:var(--primary-light); color:var(--primary); border-color:var(--primary); }
    .hint-btn:disabled { opacity:0.4; cursor:default; }
    .theme-reveal { font-size:0.8rem; color:var(--primary); background:var(--primary-light); padding:3px 12px; border-radius:10px; font-weight:700; min-height:1.6em; }

    /* Back face */
    .result-badge { font-size:1.4rem; font-weight:800; }
    .result-badge.ok  { color:var(--success); }
    .result-badge.ng  { color:var(--danger); font-size:1rem; }

    .answer-word { font-size:2.2rem; font-weight:800; color:var(--text); letter-spacing:-1px; }
    .answer-meaning { font-size:1rem; color:var(--primary); font-weight:700; }
    .full-sentence {
      font-size:0.9rem; line-height:1.7; background:#F8F9FF;
      padding:10px 14px; border-radius:10px; text-align:center; width:100%;
    }
    .full-sentence .hl { color:var(--primary); font-weight:700; }
    .sent-ja { font-size:0.8rem; color:var(--text-sub); margin-top:3px; }
    .typed-wrong { font-size:0.8rem; color:var(--danger); }

    /* Meanings list (back face) */
    .meanings-list { width:100%; display:flex; flex-direction:column; gap:4px; }
    .meaning-item { font-size:0.82rem; color:var(--text-sub); display:flex; gap:6px; align-items:baseline; }
    .meaning-item.current { color:var(--text); font-weight:700; }
    .meaning-num { flex-shrink:0; }

    .audio-row { display:flex; gap:8px; }
    .audio-btn { display:inline-flex; align-items:center; gap:5px; padding:7px 14px; border-radius:20px; border:none; cursor:pointer; font-size:0.8rem; font-weight:600; transition:opacity 0.2s; }
    .audio-btn.w { background:var(--primary-light); color:var(--primary); }
    .audio-btn.s { background:#F0FDF4; color:#166534; }
    .audio-btn:hover { opacity:0.75; }

    /* Result buttons */
    .res-row { display:flex; flex-direction:column; align-items:center; gap:8px; width:100%; margin-top:4px; }
    .res-btns { display:flex; gap:10px; width:100%; }
    .rb { flex:1; padding:12px 8px; border:none; border-radius:12px; font-size:0.88rem; font-weight:700; cursor:pointer; transition:transform 0.15s; }
    .rb:hover { transform:translateY(-2px); }
    .rb.next   { background:var(--primary-light); color:var(--primary); border:2px solid #C7D2FE; }
    .rb.review { background:var(--primary-light); color:var(--primary); border:2px solid #C7D2FE; }
    .hint-note { font-size:0.78rem; color:var(--warning); font-weight:600; }

    /* Input shake animation */
    @keyframes shake {
      0%,100% { transform:translateX(0); }
      20%     { transform:translateX(-6px); }
      40%     { transform:translateX(6px); }
      60%     { transform:translateX(-4px); }
      80%     { transform:translateX(4px); }
    }
    .answer-input.shake { animation:shake 0.4s ease; border-color:var(--danger); }

    /* ===== Login screen ===== */
    .login-screen { display:none; position:fixed; inset:0; z-index:2000; background:var(--bg); flex-direction:column; align-items:center; justify-content:center; gap:24px; padding:40px 20px; text-align:center; }
    .login-screen.show { display:flex; }
    .login-logo { font-size:2.8rem; font-weight:900; color:var(--primary); letter-spacing:-1px; }
    .login-tagline { font-size:0.9rem; color:var(--text-sub); line-height:1.7; }
    .login-google-btn { display:flex; align-items:center; gap:12px; padding:14px 28px; background:white; border:2px solid var(--border); border-radius:14px; font-size:1rem; font-weight:600; cursor:pointer; color:var(--text); box-shadow:0 2px 8px rgba(0,0,0,0.1); transition:box-shadow 0.2s; }
    .login-google-btn:hover { box-shadow:0 4px 16px rgba(0,0,0,0.18); }

    /* User chip in header */
    .user-chip { display:none; align-items:center; gap:8px; background:rgba(255,255,255,0.15); padding:5px 12px; border-radius:20px; }
    .user-chip .uname { font-size:0.78rem; font-weight:600; max-width:100px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .logout-btn { background:none; border:1px solid rgba(255,255,255,0.5); color:white; font-size:0.7rem; padding:3px 8px; border-radius:10px; cursor:pointer; }
    .logout-btn:hover { background:rgba(255,255,255,0.2); }

    /* ===== Rotate overlay (phones in landscape) ===== */
    .rotate-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 9999;
      background: var(--bg);
      flex-direction: column; align-items: center; justify-content: center;
      gap: 14px; text-align: center; padding: 20px;
    }
    .rotate-overlay .r-icon { font-size: 3rem; }
    .rotate-overlay p { font-size: 1rem; color: var(--text-sub); }

    @media screen and (orientation: landscape) and (max-height: 600px) {
      .rotate-overlay { display: flex; }
    }

    /* Done state */
    .done { text-align:center; padding:50px 20px; background:var(--card-bg); border-radius:var(--radius); box-shadow:0 6px 28px rgba(108,99,255,0.13); }
    .done .icon { font-size:3.5rem; margin-bottom:12px; }
    .done h2 { font-size:1.3rem; font-weight:800; margin-bottom:8px; }
    .done p { color:var(--text-sub); margin-bottom:20px; }
    .restart { padding:12px 28px; background:var(--primary); color:white; border:none; border-radius:12px; font-size:0.9rem; font-weight:700; cursor:pointer; }

    /* ===== Story tab ===== */
    .story-card { background:var(--card-bg); border-radius:var(--radius); box-shadow:0 6px 28px rgba(108,99,255,0.10); overflow:hidden; }
    .story-hdr { background:linear-gradient(135deg,var(--primary),#A855F7); color:white; padding:18px 22px; }
    .story-hdr h2 { font-size:1rem; font-weight:700; }
    .story-hdr p { font-size:0.75rem; opacity:0.85; margin-top:3px; }
    .srow { padding:14px 20px; border-bottom:1px solid var(--border); display:flex; align-items:flex-start; gap:10px; }
    .srow:last-child { border-bottom:none; }
    .snum { font-size:0.7rem; font-weight:700; color:var(--primary); background:var(--primary-light); padding:2px 7px; border-radius:7px; flex-shrink:0; margin-top:4px; }
    .stxt { font-size:0.92rem; line-height:1.75; flex:1; }
    .stxt .hl { color:var(--primary); font-weight:700; border-bottom:2px solid var(--primary); }
    .splay { background:var(--primary-light); border:none; cursor:pointer; color:var(--primary); padding:4px 10px; border-radius:20px; font-size:0.95rem; flex-shrink:0; font-weight:700; }
    .splay:hover { background:#C7D2FE; }

    /* ===== Results tab ===== */
    .stat-row { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:18px; }
    .stat { background:var(--card-bg); border-radius:14px; padding:16px 12px; text-align:center; box-shadow:0 4px 14px rgba(108,99,255,0.08); }
    .stat .n { font-size:1.8rem; font-weight:800; }
    .stat .l { font-size:0.75rem; color:var(--text-sub); margin-top:3px; }
    .sg .n{color:var(--success);} .sy .n{color:var(--warning);} .sr .n{color:var(--danger);}

    .wlist { background:var(--card-bg); border-radius:14px; box-shadow:0 4px 14px rgba(108,99,255,0.08); overflow:hidden; }
    .wlist-hdr { padding:12px 18px; font-weight:700; font-size:0.85rem; border-bottom:1px solid var(--border); color:var(--text-sub); background:#F9FAFB; }
    .wi { padding:11px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; font-size:0.88rem; }
    .wi:last-child { border-bottom:none; }
    .dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
    .dg{background:var(--success);} .dy{background:var(--warning);} .dr{background:var(--danger);} .dn{background:#D1D5DB;}
    .wen { font-weight:700; flex:1; } .wja { color:var(--text-sub); font-size:0.82rem; } .wsc { font-size:0.77rem; color:var(--text-sub); }
    .wi { cursor:pointer; }
    .wi:hover { background:#F9FAFB; }
    .review-tag { background:none; border:1px solid #C7D2FE; color:var(--primary); font-size:0.72rem; padding:2px 8px; border-radius:10px; cursor:pointer; flex-shrink:0; font-weight:600; }
    .review-tag:hover { background:var(--primary-light); }

    /* ===== Reference Modal ===== */
    .ref-modal { display:none; position:fixed; inset:0; z-index:1000; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; padding:20px; }
    .ref-modal.open { display:flex; }
    .ref-panel { background:var(--card-bg); border-radius:var(--radius); box-shadow:0 12px 40px rgba(108,99,255,0.25); width:100%; max-width:420px; overflow:hidden; }
    .ref-top { display:flex; align-items:center; justify-content:space-between; padding:13px 18px; border-bottom:1px solid var(--border); }
    .ref-title { font-weight:700; color:var(--text); font-size:0.9rem; }
    .ref-close { background:none; border:none; font-size:1.2rem; cursor:pointer; color:var(--text-sub); padding:2px 8px; border-radius:6px; line-height:1; }
    .ref-close:hover { background:var(--border); }
    .ref-body { padding:20px 22px; display:flex; flex-direction:column; align-items:center; gap:10px; }
    .ref-word { font-size:2rem; font-weight:800; color:var(--text); letter-spacing:-1px; }
    .ref-meaning { font-size:0.95rem; color:var(--primary); font-weight:700; }
    .ref-img { width:110px; height:110px; object-fit:contain; border-radius:12px; background:#F8F9FF; padding:6px; }
    .ref-sent { font-size:0.88rem; line-height:1.7; background:#F8F9FF; padding:10px 14px; border-radius:10px; text-align:center; width:100%; }
    .ref-sent .hl { color:var(--primary); font-weight:700; }
    .ref-sent-ja { font-size:0.78rem; color:var(--text-sub); margin-top:3px; }
    .ref-nav { display:none; align-items:center; justify-content:center; gap:10px; padding:10px 0 16px; }
    .ref-nav-btn { background:var(--primary-light); color:var(--primary); border:none; border-radius:8px; padding:5px 14px; font-size:0.85rem; cursor:pointer; font-weight:700; }
    .ref-nav-btn:disabled { opacity:0.3; cursor:default; }
    .ref-nav-dots { display:flex; gap:6px; align-items:center; }
    .ref-nav-dot { width:8px; height:8px; border-radius:50%; background:var(--border); }
    .ref-nav-dot.on { background:var(--primary); }

    /* ===== iPad styles (min-width: 768px) ===== */
    @media (min-width: 768px) {
      /* Header */
      header h1 { font-size: 1.4rem; }
      header .sub { font-size: 0.95rem; }
      .streak { font-size: 1rem; }
      .user-chip .uname { font-size: 1rem; max-width: 160px; }
      .logout-btn { font-size: 0.88rem; padding: 5px 12px; }

      /* Progress / tabs */
      .prog-row { font-size: 1rem; }
      .tab { font-size: 1.05rem; padding: 14px 0; }

      /* Card front */
      .ctr { font-size: 1rem; }
      .card-illust { width: 180px; height: 180px; }
      .sent-display { font-size: 1.35rem; }
      #ansInput { font-size: 1.2rem; padding: 14px 18px; }
      #checkBtn { font-size: 1.05rem; padding: 14px 24px; }
      .hint-btn { font-size: 1rem; padding: 8px 18px; }
      .theme-reveal { font-size: 1rem; }

      /* Card back */
      .result-badge { font-size: 1.7rem; }
      .result-badge.ng { font-size: 1.25rem; }
      .answer-word { font-size: 2.8rem; }
      .answer-meaning { font-size: 1.2rem; }
      .full-sentence { font-size: 1.1rem; }
      .sent-ja { font-size: 1rem; }
      .meaning-item { font-size: 1rem; }
      .audio-btn { font-size: 1rem; padding: 10px 18px; }
      .rb { font-size: 1.05rem; padding: 15px 8px; }
      .hint-note { font-size: 0.95rem; }

      /* Story */
      .story-hdr h2 { font-size: 1.25rem; }
      .story-hdr p { font-size: 0.95rem; }
      .stxt { font-size: 1.1rem; }
      .splay { font-size: 1.1rem; padding: 6px 14px; }

      /* Results */
      .stat .n { font-size: 2.2rem; }
      .stat .l { font-size: 0.95rem; }
      .wi { font-size: 1.05rem; padding: 14px 18px; }
      .wja { font-size: 1rem; }

      /* Ref modal */
      .ref-word { font-size: 2.4rem; }
      .ref-meaning { font-size: 1.15rem; }
      .ref-img { width: 140px; height: 140px; }
      .ref-sent { font-size: 1.05rem; }
      .ref-sent-ja { font-size: 0.95rem; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Kaya's Vocab</h1>
    <div class="sub">NEW TREASURE Stage 1</div>
  </div>
  <div class="streak" id="streakWrap">🔥 <span id="streakN">0</span>日連続</div>
  <div class="user-chip" id="userChip">
    <span class="uname" id="userName"></span>
    <button class="logout-btn" id="logoutBtn">ログアウト</button>
  </div>
</header>

<div class="prog-wrap">
  <div class="prog-row"><span id="progLbl">0 / 16 語マスター</span><span id="progPct">0%</span></div>
  <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
</div>

<div class="tabs">
  <button class="tab on" data-tab="cards">カード学習</button>
  <button class="tab" data-tab="story">ストーリー</button>
  <button class="tab" data-tab="results">進捗</button>
</div>

<main>

  <!-- CARDS -->
  <div class="view on" id="tab-cards">
    <div id="cardWrap">
      <p class="ctr" id="ctr">1 / 16</p>

      <div class="scene">
        <div class="card3d" id="card3d">

          <!-- FRONT -->
          <div class="face front" id="faceF">
            <img class="card-illust" id="cardIllust" src="" alt="">
            <p class="sent-display" id="fSent"></p>
            <span class="theme-reveal" id="fTheme" style="visibility:hidden"></span>
            <div class="input-row">
              <input class="answer-input" id="ansInput" type="text" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" placeholder="英単語を入力…">
              <button class="check-btn" id="checkBtn">確認 →</button>
            </div>
            <div class="hint-row">
              <button class="hint-btn" id="hintTheme">🏷️ ヒント</button>
              <button class="hint-btn" id="hintAudio">🔊 発音</button>
            </div>
          </div>

          <!-- BACK -->
          <div class="face back" id="faceB">
            <span class="result-badge" id="resBadge"></span>
            <div class="answer-word" id="ansWord"></div>
            <div class="answer-meaning" id="ansMeaning"></div>
            <div class="meanings-list" id="meaningsList"></div>
            <div class="full-sentence">
              <p id="fullSent"></p>
              <p class="sent-ja" id="fullSentJa"></p>
            </div>
            <p class="typed-wrong" id="typedWrong"></p>
            <div class="audio-row">
              <button class="audio-btn w" id="btnWordAudio">🔊 単語</button>
              <button class="audio-btn s" id="btnSentAudio">🔊 例文</button>
            </div>
            <div class="res-row" id="resRow"></div>
          </div>

        </div>
      </div>
    </div>

    <div class="done" id="doneWrap" style="display:none">
      <div class="icon">🎉</div>
      <h2>セッション完了！</h2>
      <p id="doneMsg"></p>
      <button class="restart" id="restartBtn">もう一度練習する</button>
    </div>
  </div>

  <!-- STORY -->
  <div class="view" id="tab-story">
    <div class="story-card">
      <div class="story-hdr">
        <h2 id="storyTitle"></h2>
        <p>今日の学習単語が全部入っています。🔊で文ごとに音声を聞こう！</p>
      </div>
      <div id="storyBody"></div>
    </div>
  </div>

  <!-- RESULTS -->
  <div class="view" id="tab-results">
    <div class="stat-row">
      <div class="stat sg"><div class="n" id="cG">0</div><div class="l">🟢 マスター</div></div>
      <div class="stat sy"><div class="n" id="cY">0</div><div class="l">🟡 練習中</div></div>
      <div class="stat sr"><div class="n" id="cR">0</div><div class="l">🔴 要復習</div></div>
    </div>
    <div class="wlist">
      <div class="wlist-hdr">単語一覧</div>
      <div id="wlistBody"></div>
    </div>
  </div>

</main>

<!-- Login Screen -->
<div class="login-screen" id="loginScreen">
  <div class="login-logo">📚 Anki Studio</div>
  <p class="login-tagline">学習の記録をクラウドで管理。<br>どのデバイスからでも続きを。</p>
  <button class="login-google-btn" id="loginBtn">
    <svg width="22" height="22" viewBox="0 0 48 48">
      <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.8 2.5 30.2 0 24 0 14.6 0 6.6 5.4 2.7 13.3l7.8 6c1.8-5.4 6.9-9.8 13.5-9.8z"/>
      <path fill="#4285F4" d="M46.1 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.4c-.5 2.8-2.1 5.2-4.5 6.8l7 5.4c4.1-3.8 6.2-9.4 6.2-16.2z"/>

<script>
const BASE = location.pathname.replace(/\/index\.html$/, '').replace(/\/$/, '') + '/';
const AUDIO = BASE + 'data/audio/';
const VOCAB = ['store','well','dress','coat','hospital','always','pencil',
               'calendar','pharmacy','tickets','station','awesome',
               'excited','clown','over','difficult'];
const KEY = 'kaya_vocab_v1';

// === Supabase ===
const SUPA_URL = 'https://uzpmpjkkwapaohleejtt.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV6cG1wamtrd2FwYW9obGVlanR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5NzkzMjksImV4cCI6MjA4ODU1NTMyOX0.vnmV6eC05k4BRMR3SgrJBrn5x0gb0_4wI9_L39pGfl0';
const BOOK_KEY = 'kaya-stage1';
const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);

const POS_MAP = {'名':'名詞','動':'動詞','副':'副詞','形':'形容詞','前':'前置詞','副・前':'副詞・前置詞'};

let words = [], queue = [], qi = 0, storyData = null;
let stats = {correct:0, incorrect:0};
let isFlipped = false;
let hintUsed = false;
let refCards = [], refIdx = 0;
let currentUser = null;

const $ = id => document.getElementById(id);
const txt = (id, v) => $(id).textContent = v;
const clr = id => { const n=$(id); while(n.firstChild) n.removeChild(n.firstChild); };
const loadP = () => { try { return JSON.parse(localStorage.getItem(KEY))||{}; } catch{return{};} };
const saveP = d => localStorage.setItem(KEY, JSON.stringify(d));
const today = () => new Date().toISOString().split('T')[0];

// --- Audio ---
let _currentAudio = null;

function stopAllAudio() {
  if (_currentAudio) {
    _currentAudio.onended = null;  // prevent pending sequence from continuing
    _currentAudio.pause();
    _currentAudio = null;
  }
}

const playAudio = src => {
  stopAllAudio();
  const a = new Audio(src);
  _currentAudio = a;
  a.onended = () => { if (_currentAudio === a) _currentAudio = null; };
  a.play().catch(() => {});
};
const playWord = () => playAudio(AUDIO + 'words/' + queue[qi].word + '.mp3');
const playSent = () => playAudio(AUDIO + 'sentences/' + queue[qi].id + '.mp3');
const playStory = i => playAudio(AUDIO + 'story/s' + String(i).padStart(2,'0') + '.mp3');

// Promise-based audio (for sequencing)
function playAudioP(src) {
  return new Promise(resolve => {
    const a = new Audio(src);
    _currentAudio = a;
    a.onended = resolve;
    a.onerror = resolve;
    a.play().catch(resolve);
  });
}

// Backside audio sequence: word → sentence
async function playIncorrectSequence(w) {
  await playAudioP(AUDIO + 'words/' + w.word + '.mp3');
  await playAudioP(AUDIO + 'sentences/' + w.id + '.mp3');
}

// --- Story highlight (safe DOM, matchAll) ---
function buildHighlight(sentence) {
  const wrap = document.createElement('span');
  wrap.className = 'stxt';
  const re = new RegExp('\\b(' + VOCAB.join('|') + ')(s?)\\b', 'gi');
  const ms = [...sentence.matchAll(re)];
  let pos = 0;
  ms.forEach(m => {
    if (m.index > pos) wrap.appendChild(document.createTextNode(sentence.slice(pos, m.index)));
    const hl = document.createElement('span'); hl.className = 'hl'; hl.textContent = m[0];
    wrap.appendChild(hl);
    pos = m.index + m[0].length;
  });
  if (pos < sentence.length) wrap.appendChild(document.createTextNode(sentence.slice(pos)));
  return wrap;
}

// --- Build sentence with blank using DOM ---
function buildSentWithBlank(sentence, word) {
  const re = new RegExp('\\b' + word + 's?\\b', 'i');
  const m = re.exec ? sentence.match(re) : null;
  const container = document.createElement('span');
  if (!m) {
    container.appendChild(document.createTextNode(sentence));
    return container;
  }
  const before = sentence.slice(0, m.index);
  const after  = sentence.slice(m.index + m[0].length);
  if (before) container.appendChild(document.createTextNode(before));
  const blank = document.createElement('span');
  blank.className = 'blank';
  blank.textContent = '\u00A0'.repeat(Math.max(word.length, 6));
  container.appendChild(blank);
  if (after) container.appendChild(document.createTextNode(after));
  return container;
}

// --- Init ---
async function initApp() {
  const d = await (await fetch(BASE + 'data/words.json?v=' + Date.now())).json();
  words = d.words; storyData = d.story;
  const p = loadP();
  const newDate = d.meta && d.meta.created;
  const isNewDay = newDate && p._wordsDate !== newDate;
  if (isNewDay) {
    words.forEach(w => delete p[w.id]);
    p._wordsDate = newDate;
    saveP(p);
  } else {
    words.forEach(w => { if (p[w.id]) Object.assign(w, p[w.id]); });
  }

  // Supabase進捗をバックグラウンドで非同期ロード（UIをブロックしない）
  if (currentUser) {
    sb.from('progress_sync')
      .select('word_key, status, correct, incorrect')
      .eq('user_id', currentUser.id)
      .eq('book_key', BOOK_KEY)
      .then(({ data }) => {
        if (!isNewDay && data && data.length > 0) {
          const map = {};
          data.forEach(r => { map[r.word_key] = r; });
          let updated = false;
          words.forEach(w => {
            if (map[w.id]) {
              w.status    = map[w.id].status;
              w.correct   = map[w.id].correct;
              w.incorrect = map[w.id].incorrect;
              updated = true;
            }
          });
          if (updated) { buildQueue(); renderCard(); renderResults(); updateProg(); }
        }
      })
      .catch(e => console.warn('progress load skipped:', e.message));
  }
  updateStreak(); buildQueue(); renderCard(); renderStory(); renderResults(); updateProg();

  $('checkBtn').onclick = checkAnswer;
  $('ansInput').addEventListener('keydown', e => { if (e.key === 'Enter') { if (!isFlipped) { e.stopPropagation(); checkAnswer(); } } });
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && isFlipped) {
      const nextBtn = document.querySelector('#resRow .rb.next');
      if (nextBtn) nextBtn.click();
    }
  });
  $('faceF').addEventListener('click', e => {
    if (!isFlipped && e.target === $('faceF') || e.target.closest('.sent-display, .card-illust, .theme-reveal')) {
      $('ansInput').focus();
    }
  });
  $('hintTheme').onclick = () => {
    $('fTheme').style.visibility = 'visible';
    $('hintTheme').disabled = true;
    hintUsed = true;
  };
  $('hintAudio').onclick = () => { playWord(); hintUsed = true; };
  $('btnWordAudio').onclick = playWord;
  $('btnSentAudio').onclick = playSent;
  $('restartBtn').onclick = restart;
  $('refClose').onclick = () => $('refModal').classList.remove('open');
  $('refModal').addEventListener('click', e => { if (e.target === $('refModal')) $('refModal').classList.remove('open'); });
  document.querySelectorAll('.tab').forEach(b => b.addEventListener('click', () => switchTab(b.dataset.tab, b)));
}

function buildQueue() {
  queue = [
    ...words.filter(w => w.status==='red'),
    ...words.filter(w => w.status==='yellow'),
    ...words.filter(w => w.status==='new'),
  ];
  qi = 0;
}

function populateBackFace(w) {
  txt('ansWord', w.english);
  txt('ansMeaning', w.japanese + '  (' + (POS_MAP[w.pos] || w.pos) + ')');
  clr('meaningsList');
  const sameWord = words.filter(w2 => w2.word === w.word);
  if (sameWord.length > 1) {
    const nums = ['①','②','③','④','⑤'];
    sameWord.forEach((m, i) => {
      const item = document.createElement('div');
      item.className = 'meaning-item' + (m.id === w.id ? ' current' : '');
      const num = document.createElement('span'); num.className = 'meaning-num'; num.textContent = nums[i];
      const lbl = document.createElement('span');
      lbl.textContent = m.japanese + '【' + (POS_MAP[m.pos] || m.pos) + '】';
      item.appendChild(num); item.appendChild(lbl);
      $('meaningsList').appendChild(item);
    });
  }
  clr('fullSent');
  const re2 = new RegExp('\\b' + w.english + 's?\\b', 'gi');
  const ms = [...w.sentence.matchAll(re2)];
  if (ms.length > 0) {
    let pos2 = 0;
    ms.forEach(m => {
      if (m.index > pos2) $('fullSent').appendChild(document.createTextNode(w.sentence.slice(pos2, m.index)));
      const hl = document.createElement('span'); hl.className = 'hl'; hl.textContent = m[0];
      $('fullSent').appendChild(hl);
      pos2 = m.index + m[0].length;
    });
    if (pos2 < w.sentence.length) $('fullSent').appendChild(document.createTextNode(w.sentence.slice(pos2)));
  } else {
    $('fullSent').appendChild(document.createTextNode(w.sentence));
  }
  txt('fullSentJa', w.sentence_ja);
}

function renderCard() {
  if (qi >= queue.length) { showDone(); return; }
  const w = queue[qi];

  // Reset flip — start animation (180° → 0°)
  isFlipped = false;
  hintUsed = false;
  $('card3d').classList.remove('flipped');
  $('faceB').classList.remove('correct', 'wrong');
  $('ansInput').value = '';
  $('ansInput').classList.remove('shake');
  txt('typedWrong', '');
  clr('resRow');

  // 裏面を即座にクリア（フリップアニメーション中に答えが見えないように）
  txt('ansWord', '');
  txt('ansMeaning', '');
  clr('meaningsList');
  clr('fullSent');
  txt('fullSentJa', '');
  txt('resBadge', '');

  // Front（裏返し中も非表示なので即時更新して問題なし）
  txt('ctr', (qi+1) + ' / ' + queue.length);
  const posLabel = POS_MAP[w.pos] || w.pos;
  txt('fTheme', '(Hint: ' + w.theme + ' 【' + posLabel + '】)');
  $('fTheme').style.visibility = 'hidden';
  $('hintTheme').disabled = false;
  const img = $('cardIllust');
  if (w.image) {
    img.style.display = 'none';
    img.alt = w.english;
    img.onload = () => { img.style.display = 'block'; };
    img.src = BASE + w.image + '?v=20260311';
  } else { img.style.display = 'none'; }

  clr('fSent');
  $('fSent').appendChild(buildSentWithBlank(w.sentence, w.english));

  // 裏面コンテンツはアニメーション完了後に設定（答えのフラッシュ防止）
  // --flip-speed: 0.55s なので 600ms 待つ。600ms 未満で解答した場合は
  // checkAnswer() 内で populateBackFace() が呼ばれるためカバー済み。
  const cardWord = w;
  setTimeout(() => {
    if (queue[qi] !== cardWord) return; // カードが切り替わっていたらスキップ
    populateBackFace(cardWord);
  }, 600);

  // Focus input after flip animation
  setTimeout(() => $('ansInput').focus(), 100);
}

function checkAnswer() {
  if (isFlipped) return;
  const w = queue[qi];
  const typed = $('ansInput').value.trim().toLowerCase();
  if (!typed) {
    $('ansInput').classList.add('shake');
    setTimeout(() => $('ansInput').classList.remove('shake'), 400);
    return;
  }

  const correct = typed === w.english.toLowerCase();
  const pluralMistake = !correct && w.plural && typed === w.plural.toLowerCase();
  isFlipped = true;
  $('card3d').classList.add('flipped');
  $('faceB').classList.add(correct ? 'correct' : 'wrong');
  // 600ms未満で解答した場合に備えて裏面コンテンツを確実にセット
  if (!$('ansWord').textContent) populateBackFace(w);

  const wrongMsg = correct ? '' :
    (pluralMistake ? '❌ 惜しい！単数・複数の違いです: "' + typed + '" → "' + w.english + '"'
                   : '❌ 入力: "' + typed + '"  →  正解: "' + w.english + '"');
  txt('resBadge', correct ? '✅ Correct!' : wrongMsg);
  $('resBadge').className = 'result-badge ' + (correct ? 'ok' : 'ng');
  txt('typedWrong', '');

  // Audio feedback: word → sentence (both correct and incorrect)
  setTimeout(() => playIncorrectSequence(w), 350);

  // Build result buttons based on correctness + hint usage
  clr('resRow');
  const btns = document.createElement('div');
  btns.className = 'res-btns';

  if (!correct) {
    // Incorrect → auto red
    const b = document.createElement('button');
    b.className = 'rb next'; b.textContent = '次へ →';
    b.onclick = () => record('red');
    btns.appendChild(b);
  } else {
    // Correct → green by default, can downgrade (hint does not affect result)
    const bReview = document.createElement('button');
    bReview.className = 'rb review'; bReview.textContent = 'もう一回';
    bReview.onclick = () => record('yellow');
    btns.appendChild(bReview);
    const bNext = document.createElement('button');
    bNext.className = 'rb next'; bNext.textContent = '次へ →';
    bNext.onclick = () => record('green');
    btns.appendChild(bNext);
  }
  $('resRow').appendChild(btns);
}

function record(status) {
  stopAllAudio();
  const w = queue[qi];
  w.status = status; w.lastSeen = today();
  if (status === 'red') { w.incorrect++; stats.incorrect++; }
  else { w.correct++; stats.correct++; }
  const p = loadP();
  p[w.id] = { status:w.status, correct:w.correct, incorrect:w.incorrect, lastSeen:w.lastSeen };
  saveP(p);
  // Push to Supabase (fire-and-forget, non-blocking)
  if (currentUser) {
    sb.from('progress_sync').upsert({
      user_id:      currentUser.id,
      book_key:     BOOK_KEY,
      word_key:     w.id,
      status:       w.status,
      correct:      w.correct,
      incorrect:    w.incorrect,
      last_studied: today(),
      updated_at:   new Date().toISOString()
    }, { onConflict: 'user_id,book_key,word_key' }).then(({ error }) => {
      if (error) console.warn('Supabase sync error:', error);
    });
  }
  qi++; updateProg(); renderCard(); renderResults();
}

function showDone() {
  $('cardWrap').style.display = 'none';
  $('doneWrap').style.display = 'block';
  const reviewWords = words.filter(w => w.status === 'red' || w.status === 'yellow');
  if (reviewWords.length > 0) {
    txt('doneMsg', queue.length + '語完了！ ✅ ' + stats.correct + '  ❌ ' + stats.incorrect + '\n要復習: ' + reviewWords.length + '語');
    $('restartBtn').textContent = '要復習を練習する';
    setTimeout(() => {
      stats = {correct:0, incorrect:0};
      queue = [...words.filter(w => w.status==='red'), ...words.filter(w => w.status==='yellow')];
      qi = 0;
      $('doneWrap').style.display = 'none';
      $('cardWrap').style.display = 'block';
      $('restartBtn').textContent = 'もう一度練習する';
      renderCard();
    }, 1500);
  } else {
    if (queue.length === 0) {
      txt('doneMsg', '今日の単語はすべてマスター済みです！🌟');
      $('restartBtn').style.display = 'none';
    } else {
      const msg = queue.length === 0
        ? '今日の単語はすべてマスター済みです！🌟'
        : queue.length + '語完了！ ✅ ' + stats.correct + '  ❌ ' + stats.incorrect + '\n全問グリーン！🌟';
      txt('doneMsg', msg);
      $('restartBtn').style.display = 'none';
    }
  }
}
function restart() {
  stats = {correct:0, incorrect:0};
  $('restartBtn').style.display = '';
  buildQueue();
  $('doneWrap').style.display = 'none';
  $('cardWrap').style.display = 'block';
  renderCard();
}

// --- Story ---
function renderStory() {
  if (!storyData) return;
  txt('storyTitle', 'Day ' + storyData.day + ': ' + storyData.title);
  clr('storyBody');
  storyData.sentences.forEach((s, i) => {
    const row = document.createElement('div'); row.className = 'srow';
    const num = document.createElement('span'); num.className = 'snum'; num.textContent = i+1;
    const btn = document.createElement('button'); btn.className = 'splay'; btn.textContent = '🔊';
    btn.onclick = () => playStory(i+1);
    row.appendChild(num);
    row.appendChild(buildHighlight(s));
    row.appendChild(btn);
    $('storyBody').appendChild(row);
  });
}

// --- Status update (from progress tab) ---
function setStatus(w, newStatus) {
  w.status = newStatus; w.lastSeen = today();
  const p = loadP();
  p[w.id] = { status:w.status, correct:w.correct, incorrect:w.incorrect, lastSeen:w.lastSeen };
  saveP(p);
  if (currentUser) {
    sb.from('progress_sync').upsert({
      user_id: currentUser.id, book_key: BOOK_KEY, word_key: w.id,
      status: w.status, correct: w.correct, incorrect: w.incorrect,
      last_studied: today(), updated_at: new Date().toISOString()
    }, { onConflict: 'user_id,book_key,word_key' }).then(({ error }) => {
      if (error) console.warn('Supabase sync error:', error);
    });
  }
  buildQueue();

  if (queue.length > 0) {
    $('doneWrap').style.display = 'none';
    $('cardWrap').style.display = 'block';
    renderCard();
  }
  renderResults(); updateProg();
}

// --- Results ---
function renderResults() {
  const g = words.filter(w=>w.status==='green').length;
  const y = words.filter(w=>w.status==='yellow').length;
  const r = words.filter(w=>w.status==='red').length;
  txt('cG',g); txt('cY',y); txt('cR',r);
  const dm = {green:'dg',yellow:'dy',red:'dr',new:'dn'};
  clr('wlistBody');
  words.forEach(w => {
    const item = document.createElement('div'); item.className = 'wi';
    const dot = document.createElement('span'); dot.className = 'dot ' + (dm[w.status]||'dn');
    const en = document.createElement('span'); en.className = 'wen'; en.textContent = w.english;
    const ja = document.createElement('span'); ja.className = 'wja'; ja.textContent = w.japanese;
    const sc = document.createElement('span'); sc.className = 'wsc'; sc.textContent = '✓'+w.correct+' ✗'+w.incorrect;
    item.appendChild(dot); item.appendChild(en); item.appendChild(ja); item.appendChild(sc);
    if (w.status === 'green') {
      const btn = document.createElement('button'); btn.className = 'review-tag'; btn.textContent = 'もう一回';
      btn.onclick = e => { e.stopPropagation(); setStatus(w, 'yellow'); };
      item.appendChild(btn);
    }
    item.onclick = () => openRef(w);
    $('wlistBody').appendChild(item);
  });
}

// --- Progress ---
function updateProg() {
  const done = words.filter(w=>w.status==='green').length;
  const pct = Math.round(done/words.length*100);
  $('progFill').style.width = pct + '%';
  txt('progLbl', done + ' / ' + words.length + ' 語マスター');
  txt('progPct', pct + '%');
}

// --- Streak ---
function updateStreak() {
  const p = loadP(), t = today();
  const y = new Date(); y.setDate(y.getDate()-1);
  const ys = y.toISOString().split('T')[0];
  let s = p._streak||0;
  if (p._lastDay===ys) s++; else if (p._lastDay!==t) s=1;
  p._streak=s; p._lastDay=t; saveP(p);
  txt('streakN', s);
}

// --- Reference Modal ---
function openRef(w) {
  refCards = words.filter(w2 => w2.word === w.word);
  refIdx = refCards.findIndex(w2 => w2.id === w.id);
  if (refIdx < 0) refIdx = 0;
  renderRefSlide();
  $('refModal').classList.add('open');
}

function renderRefSlide() {
  const w = refCards[refIdx];
  const body = $('refBody');
  clr('refBody');

  // Word
  const wEl = document.createElement('div');
  wEl.className = 'ref-word'; wEl.textContent = w.english;
  body.appendChild(wEl);

  // Meaning + pos
  const mEl = document.createElement('div');
  mEl.className = 'ref-meaning';
  mEl.textContent = w.japanese + '  (' + (POS_MAP[w.pos] || w.pos) + ')';
  body.appendChild(mEl);

  // Meanings list (multi-meaning only)
  if (refCards.length > 1) {
    const mlEl = document.createElement('div');
    mlEl.className = 'meanings-list';
    const nums = ['①','②','③','④','⑤'];
    refCards.forEach((m, i) => {
      const item = document.createElement('div');
      item.className = 'meaning-item' + (m.id === w.id ? ' current' : '');
      const num = document.createElement('span'); num.className = 'meaning-num'; num.textContent = nums[i];
      const lbl = document.createElement('span');
      lbl.textContent = m.japanese + '【' + (POS_MAP[m.pos] || m.pos) + '】';
      item.appendChild(num); item.appendChild(lbl);
      mlEl.appendChild(item);
    });
    body.appendChild(mlEl);
  }

  // Image
  if (w.image) {
    const img = document.createElement('img');
    img.className = 'ref-img'; img.src = BASE + w.image; img.alt = w.english;
    body.appendChild(img);
  }

  // Sentence with highlight
  const sentEl = document.createElement('div');
  sentEl.className = 'ref-sent';
  const sentP = document.createElement('p');
  const re = new RegExp('\\b' + w.english + 's?\\b', 'gi');
  const ms = [...w.sentence.matchAll(re)];
  if (ms.length > 0) {
    let pos = 0;
    ms.forEach(m => {
      if (m.index > pos) sentP.appendChild(document.createTextNode(w.sentence.slice(pos, m.index)));
      const hl = document.createElement('span'); hl.className = 'hl'; hl.textContent = m[0];
      sentP.appendChild(hl);
      pos = m.index + m[0].length;
    });
    if (pos < w.sentence.length) sentP.appendChild(document.createTextNode(w.sentence.slice(pos)));
  } else {
    sentP.appendChild(document.createTextNode(w.sentence));
  }
  sentEl.appendChild(sentP);
  const sentJa = document.createElement('p');
  sentJa.className = 'ref-sent-ja'; sentJa.textContent = w.sentence_ja;
  sentEl.appendChild(sentJa);
  body.appendChild(sentEl);

  // Audio buttons
  const audioRow = document.createElement('div');
  audioRow.className = 'audio-row';
  const wBtn = document.createElement('button');
  wBtn.className = 'audio-btn w'; wBtn.textContent = '🔊 単語';
  wBtn.onclick = () => playAudio(AUDIO + 'words/' + w.word + '.mp3');
  const sBtn = document.createElement('button');
  sBtn.className = 'audio-btn s'; sBtn.textContent = '🔊 例文';
  sBtn.onclick = () => playAudio(AUDIO + 'sentences/' + w.id + '.mp3');
  audioRow.appendChild(wBtn); audioRow.appendChild(sBtn);
  body.appendChild(audioRow);

  // Nav for multi-meaning
  const nav = $('refNav');
  clr('refNav');
  if (refCards.length > 1) {
    nav.style.display = 'flex';
    const prev = document.createElement('button');
    prev.className = 'ref-nav-btn'; prev.textContent = '← 前';
    prev.disabled = refIdx === 0;
    prev.onclick = () => { refIdx--; renderRefSlide(); };

    const dotsEl = document.createElement('div');
    dotsEl.className = 'ref-nav-dots';
    refCards.forEach((_, i) => {
      const dot = document.createElement('div');
      dot.className = 'ref-nav-dot' + (i === refIdx ? ' on' : '');
      dotsEl.appendChild(dot);
    });

    const next = document.createElement('button');
    next.className = 'ref-nav-btn'; next.textContent = '次 →';
    next.disabled = refIdx === refCards.length - 1;
    next.onclick = () => { refIdx++; renderRefSlide(); };

    nav.appendChild(prev); nav.appendChild(dotsEl); nav.appendChild(next);
    txt('refTitle', w.word + '  ' + (refIdx + 1) + ' / ' + refCards.length);
  } else {
    nav.style.display = 'none';
    txt('refTitle', w.word);
  }
}

// --- Tab ---
function switchTab(name, btn) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  $('tab-'+name).classList.add('on');
  btn.classList.add('on');
  if (name === 'cards' && queue.length > 0 && qi < queue.length) {
    txt('ctr', (qi+1) + ' / ' + queue.length);

  }
}

// === Auth ===
function showLogin() { $('loginScreen').classList.add('show'); }
function showApp()   { $('loginScreen').classList.remove('show'); }

function setUserChip(user) {
  $('userChip').style.display = 'flex';
  $('streakWrap').style.display = 'none';
  const name = user.user_metadata?.full_name || user.user_metadata?.name || user.email;
  $('userName').textContent = name;
}

async function signIn() {
  await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: location.origin + location.pathname }
  });
}

async function signOut() {
  await sb.auth.signOut();
}

async function bootAuth() {
  $('loginBtn').onclick = signIn;
  $('logoutBtn').onclick = signOut;

  sb.auth.onAuthStateChange(async (event, session) => {
    if (session) {
      // Logged in (INITIAL_SESSION with session, or SIGNED_IN)
      if (!currentUser) {
        currentUser = session.user;
        setUserChip(currentUser);
        showApp();
        try { await initApp(); } catch(e) { console.error('[initApp] ERROR:', e); }
      }
    } else {
      // No session
      if (currentUser) {
        // Was logged in → now signed out
        currentUser = null;
        $('userChip').style.display = 'none';
        $('streakWrap').style.display = 'flex';
        showLogin();
      } else if (event === 'INITIAL_SESSION') {
        // No session on startup → show login
        showLogin();
      }
    }
  });
}

bootAuth();
</script>
